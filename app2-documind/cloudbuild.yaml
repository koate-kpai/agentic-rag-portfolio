# cloudbuild.yaml — Build configuration for app2-documind
#
# ARCHITECTURAL DECISION: Docker layer caching with --cache-from
# ----------------------------------------------------------------
# Without caching, every Cloud Build invocation rebuilds every layer from
# scratch — pip install, apt-get, etc.  On a cold start this takes 3-5
# minutes per deploy (at $0.003/second per vCPU).  A typical day's deploys
# (5-10 pushes to main) waste 15-50 minutes of compute time.
#
# By pulling the previous image and passing it as --cache-from, Docker
# reuses unchanged layers (especially the pip install layer which is the
# most expensive).  If this is the first build (no previous image exists),
# the `docker pull` fails silently thanks to `|| true`.
#
# The cache source is the same image tag ($_TAG), so every build updates
# the cache for the next one.  For a two-app deploy that saves ~4 minutes
# per push.

options:
  logging: CLOUD_LOGGING_ONLY
steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull $_TAG || true
        docker build \
          --cache-from $_TAG \
          -t $_TAG \
          .
images:
  - '$_TAG'
