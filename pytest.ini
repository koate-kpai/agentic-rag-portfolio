# pytest.ini — Test discovery & configuration
#
# ARCHITECTURAL DECISION: Pytest over unittest
# ----------------------------------------------
# We use pytest for three reasons:
#   1. Minimal boilerplate — plain assert statements instead of self.assertEqual().
#   2. Native async support via pytest-asyncio — critical for testing async
#      FastAPI endpoints and OpenAI client calls without hacks.
#   3. Fixture system — allows shared mock objects (AsyncOpenAI client) to be
#      defined once and injected across test modules cleanly.
#
# testpaths restricts discovery to the two app test directories, avoiding
# false matches in venv/, .git/, or other tooling directories.
#
# pythonpath adds each app's src directory to sys.path so that tests can use
# natural imports like "from src.agent import WebScoutAgent".  Each test
# directory has its own conftest.py that adds its specific src path, but
# because both test dirs are named "tests", pytest can confuse the two
# conftest modules.  The pythonpath option avoids this entirely by adding
# both src directories to sys.path before any module is loaded.

[pytest]
# testpaths intentionally omitted — both apps have a "src" package, and only
# one can be in sys.path at a time.  Run tests per app:
#   pytest app1-webscout/tests/ --tb=short -q
#   pytest app2-documind/tests/ --tb=short -q
asyncio_mode = auto
