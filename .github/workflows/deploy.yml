name: Deploy to Cloud Run

on:
  push:
    branches: [main]

# CRITICAL: This permissions block is required for keyless auth
permissions:
  contents: 'read'
  id-token: 'write'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_APP1: webscout
  SERVICE_APP2: documind

jobs:
  deploy-app1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # THE NEW KEYLESS AUTH BLOCK
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev
        
      - name: Build and Push App1
        run: |
          gcloud builds submit app1-webscout \
            --tag $REGION-docker.pkg.dev/$PROJECT_ID/$SERVICE_APP1/app1 \
            --service-account=projects/$PROJECT_ID/serviceAccounts/github-actions-deployer@$PROJECT_ID.iam.gserviceaccount.com \
            --quiet
            
      - name: Deploy App1 to Cloud Run
        run: |
          gcloud run deploy $SERVICE_APP1 \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$SERVICE_APP1/app1 \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --quiet

  deploy-app2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # THE NEW KEYLESS AUTH BLOCK
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        
      - name: Configure Docker
        run: gcloud auth configure-docker $REGION-docker.pkg.dev
        
      - name: Build and Push App2
        run: |
          gcloud builds submit app2-documind \
            --tag $REGION-docker.pkg.dev/$PROJECT_ID/$SERVICE_APP2/app2 \
            --service-account=projects/$PROJECT_ID/serviceAccounts/github-actions-deployer@$PROJECT_ID.iam.gserviceaccount.com \
            --quiet
            
      - name: Deploy App2 to Cloud Run
        run: |
          gcloud run deploy $SERVICE_APP2 \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$SERVICE_APP2/app2 \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --quiet